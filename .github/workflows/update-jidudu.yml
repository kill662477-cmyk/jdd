name: Update Jidudu SOOP Data

on:
  workflow_dispatch:
  schedule:
    # KST 00:10, 06:10, 12:10, 18:10
    # GitHub Actions cron uses UTC.
    - cron: "10 15,21,3,9 * * *"

permissions:
  contents: write

jobs:
  update-jidudu-data:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright beautifulsoup4 lxml
          python -m playwright install --with-deps chromium

      - name: Scrape SOOP data
        run: |
          python scripts/scrape_jidudu_soop.py

      - name: Upload debug files on failure or empty result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jidudu-debug
          path: |
            debug/
          if-no-files-found: ignore

      - name: Commit updated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add schedule.json vod.json
          if git diff --cached --quiet; then
            echo "No JSON changes."
          else
            git commit -m "Update Jidudu SOOP schedule and VOD"
            git push
          fi
