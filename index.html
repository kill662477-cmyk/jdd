<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>지두두 개인현황판</title>
<style>
  :root {
    --pink:#ff4fb3; --pink2:#ff9bd1; --pink3:#ffd9ec; --ink:#2b1022;
    --muted:#9b557c; --card:rgba(255,255,255,.78); --line:#ffc1de;
  }
  *{box-sizing:border-box} html{margin:0;padding:0;background:#ffd1e8;overflow-x:hidden} body{margin:0;padding:0;min-height:0;font-family:Pretendard,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink);background:radial-gradient(circle at 15% 10%,#fff 0 14%,#ffe7f3 36%,#ffd1e8 100%);background-attachment:scroll;overflow-x:hidden;}
  .wrap{width:980px;max-width:none;margin:0 auto;padding:18px 14px 0;line-height:1;}
  .hero{position:relative;border-radius:30px;padding:20px;margin:0;background:linear-gradient(135deg,rgba(255,255,255,.86),rgba(255,245,251,.72));box-shadow:0 24px 70px rgba(255,79,179,.22);border:1px solid rgba(255,255,255,.85);overflow:hidden;}
  .hero:before{content:"";position:absolute;inset:-2px;background:linear-gradient(120deg,transparent 0 35%,rgba(255,255,255,.8) 45%,transparent 58%);transform:translateX(-80%);animation:shine 7s infinite;pointer-events:none} @keyframes shine{60%,100%{transform:translateX(120%)}}
  .top{display:grid;grid-template-columns:300px 1fr;gap:18px;align-items:stretch;position:relative;z-index:1}
  .profileBox{background:#fff;border-radius:26px;padding:12px;border:1px solid #ffd0e7;box-shadow:0 14px 30px rgba(255,79,179,.16)}
  .photoWrap{position:relative;border-radius:22px;overflow:hidden;height:340px;background:#ffeaf5;border:0;}
  .profileImg{width:100%;height:100%;object-fit:cover;display:block}
  .liveNeon .photoWrap{border:4px solid var(--pink);box-shadow:0 0 0 4px rgba(255,79,179,.18),0 0 22px rgba(255,79,179,.95),0 0 48px rgba(255,79,179,.55);animation:pulse 1.55s infinite alternate}
  @keyframes pulse{from{box-shadow:0 0 0 4px rgba(255,79,179,.14),0 0 16px rgba(255,79,179,.75)}to{box-shadow:0 0 0 7px rgba(255,79,179,.20),0 0 34px rgba(255,79,179,1),0 0 70px rgba(255,79,179,.7)}}
  .badge{position:absolute;top:14px;left:14px;padding:10px 14px;border-radius:999px;background:rgba(255,255,255,.88);font-weight:900;color:#6b254d;border:1px solid #ffd2e8}
  .liveNeon .badge{background:linear-gradient(135deg,#ff4fb3,#ff2f9e);color:#fff;border:0}
  .info{display:flex;flex-direction:column;gap:12px;}
  .titleCard{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:18px 22px;border-radius:30px;background:rgba(255,255,255,.74);border:1px solid #ffd0e7;}
  .logoImg{width:104px;height:104px;object-fit:cover;border-radius:28px;background:#fff;border:3px solid #ffd0e7;box-shadow:0 12px 32px rgba(255,79,179,.22)}
  .titleText h1{font-size:38px;margin:0 0 8px;letter-spacing:-2px} .titleText p{margin:0;color:var(--muted);font-weight:800;font-size:15px}
  .quick{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  .mini{background:#fff;border:1px solid #ffc9e3;border-radius:18px;padding:14px 14px;min-height:82px;}
  .mini span{display:block;color:#b35582;font-weight:800;margin-bottom:8px;font-size:12px} .mini b{font-size:21px;white-space:nowrap;letter-spacing:-1.2px}
  .buttons{display:grid;grid-template-columns:1fr 1fr;gap:10px;} .btn{text-decoration:none;text-align:center;background:linear-gradient(135deg,#ff63bd,#ff2f9e);color:#fff;font-size:18px;font-weight:950;padding:16px;border-radius:18px;box-shadow:0 12px 28px rgba(255,47,158,.24)} .btn.sub{background:#fff;color:#b23b7a;border:1px solid #ffc1de;box-shadow:none}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:18px}
  .card{background:rgba(255,255,255,.74);border-radius:26px;padding:20px;border:1px solid rgba(255,255,255,.75);box-shadow:0 12px 34px rgba(255,79,179,.11)}
  .card h2{font-size:24px;margin:0 0 14px;letter-spacing:-1.5px}
  .noticeList,.vodList{display:flex;flex-direction:column;gap:12px}.noticeList{min-height:315px}.noticeList .notice{min-height:240px}.notice{display:block;text-decoration:none;color:var(--ink);background:#fff;border:1px solid #ffc1de;border-radius:20px;padding:18px 20px;}
  .noticeTop{display:flex;justify-content:space-between;color:#b35582;font-weight:900;font-size:14px;margin-bottom:10px;gap:10px} .notice p{margin:0;line-height:1.5;font-weight:800;display:-webkit-box;-webkit-line-clamp:6;-webkit-box-orient:vertical;overflow:hidden}
  .stats{display:grid;grid-template-columns:repeat(2,1fr);gap:14px} .stat{background:#fff;border:1px solid #ffc1de;border-radius:18px;padding:16px 18px;min-height:88px} .stat span{display:block;color:#b35582;font-weight:800;font-size:14px;margin-bottom:8px} .stat b{font-size:22px;white-space:nowrap;letter-spacing:-1.1px}
  .empty{padding:26px;border:1px dashed #ff9bd1;border-radius:20px;color:#b35582;font-weight:900;background:rgba(255,255,255,.6)}
  .footer{text-align:center;color:#b35582;font-weight:800;margin-top:10px;margin-bottom:0;padding-bottom:0}

  .profileFacts{display:grid;grid-template-columns:1.35fr .9fr 1.35fr;gap:10px}
  .profileFact{background:#fff;border:1px solid #ffc1de;border-radius:18px;padding:14px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;min-height:70px}
  .profileFact span{color:#b35582;font-weight:900;font-size:12px;white-space:nowrap}
  .profileFact b{font-size:15px;letter-spacing:-.7px;white-space:nowrap}

  .schedule{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;min-height:315px}
  .scheduleItem{background:#fff;border:1px solid #ffc1de;border-radius:18px;padding:14px 16px;min-height:96px}
  .scheduleItem .day{display:flex;justify-content:space-between;gap:10px;align-items:center;color:#b35582;font-weight:950;font-size:14px;margin-bottom:8px}
  .scheduleItem .status{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:950;color:#b35582;margin-bottom:8px}
  .scheduleItem .status:before{content:"";width:7px;height:7px;border-radius:999px;background:#ff4fb3;display:inline-block}
  .scheduleItem .time{font-size:20px;font-weight:950;letter-spacing:-1px;white-space:nowrap}
  .scheduleItem .title{margin:6px 0 0;color:#5f2849;font-weight:850;font-size:14px;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .scheduleItem.emptyDay{opacity:.72}
  .vodCard{display:block;text-decoration:none;color:var(--ink);background:#fff;border:1px solid #ffc1de;border-radius:22px;overflow:hidden;min-height:352px}
  .vodThumb{width:100%;height:250px;background:#ffeaf5;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .vodThumb img{width:100%;height:100%;object-fit:cover;display:block}
  .vodBody{padding:16px 18px}
  .vodBody .vodLabel{display:flex;justify-content:space-between;color:#b35582;font-weight:950;font-size:13px;margin-bottom:8px;gap:10px}
  .vodBody p{margin:0;line-height:1.4;font-weight:900;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

  .vodCard.noThumb .vodBody{padding:22px 20px}
  .vodCard.noThumb{min-height:auto}

  /* 모바일/작은 화면 한 페이지 맞춤 모드 */
  html.fit-onepage, html.fit-onepage body{
    width:100%;
    height:100%;
    min-height:0 !important;
    overflow:hidden !important;
    background:#ffd1e8;
  }
  html.fit-onepage .wrap{
    position:absolute;
    top:0;
    left:50%;
    margin:0;
    transform-origin:top center;
  }


#bgmToggle{
  position:absolute;
  top:15px;
  right:20px;
  z-index:9999;
  background:linear-gradient(135deg,#ff4fb3,#ff2f9e);
  color:#fff;
  font-weight:900;
  font-size:14px;
  padding:10px 16px;
  border-radius:999px;
  cursor:pointer;
  box-shadow:0 6px 18px rgba(255,47,158,.4);
}

</style>
</head>

<script>
const USER_ID='wjswlgns09';
const ANALYSIS='https://raw.githubusercontent.com/kill662477-cmyk/silver0love/main/analysis.json';
const NOTICES='https://raw.githubusercontent.com/kill662477-cmyk/silver0love/main/notices.json';
const LIVE='https://livecheck-2.onrender.com/live-status';
const SCHEDULE='https://raw.githubusercontent.com/kill662477-cmyk/jdd/main/schedule.json';
const VOD='https://raw.githubusercontent.com/kill662477-cmyk/jdd/main/vod.json';
function $(id){return document.getElementById(id)}
async function loadAnalysis(){try{const j=await (await fetch(ANALYSIS+'?v='+Date.now())).json();const item=(j.items||[]).find(x=>x.userId===USER_ID||x.name==='지두두');if(!item)return;$('time').textContent=item.monthlyBroadcastTime||'-';$('viewers').textContent=item.monthlyViewers||'-';$('poong').textContent=item.monthlyPoong||'-';$('peak').textContent=item.peakViewers||'-';$('record').textContent=(item.monthlyRecord||'-').replace(/\s+/g,' ');$('rate').textContent=item.monthlyWinRate||'-';$('updated').textContent='방송 데이터 기준: '+new Date(j.checkedAt).toLocaleString('ko-KR');}catch(e){$('updated').textContent='방송 데이터 로드 실패';}}
async function loadNotices(){try{const j=await (await fetch(NOTICES+'?v='+Date.now())).json();const list=(j.items||[]).filter(x=>x.userId===USER_ID||x.stationName==='지두두').slice(0,1);$('noticeList').innerHTML=list.length?list.map(x=>`<a class="notice" href="${x.link}" target="_blank"><div class="noticeTop"><span>${x.stationName||'지두두'}</span><span>${x.time||''}</span></div><p>${x.summary||'공지 내용 없음'}</p></a>`).join(''):'<div class="empty">지두두 방송공지가 없습니다</div>';}catch(e){$('noticeList').innerHTML='<div class="empty">방송공지 로드 실패</div>';}}
async function loadLive(){try{const j=await (await fetch(LIVE+'?v='+Date.now())).json();const on=!!(j.statuses&&j.statuses[USER_ID]);if($('liveText')) $('liveText').textContent=on?'방송 ON':'오프라인';$('liveBadge').textContent=on?'방송 ON':'오프라인';document.getElementById('profileBox').classList.toggle('liveNeon',on);}catch(e){if($('liveText')) $('liveText').textContent='확인 실패';$('liveBadge').textContent='확인 실패';}}

function fmtDateTime(v){
  if(!v) return '';
  try{return new Date(v).toLocaleString('ko-KR', {month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit'});}catch(e){return '';}
}
function escapeHtml(s){
  return String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
async function loadSchedule(){
  const box=$('scheduleList');
  if(!box) return;
  try{
    const j=await (await fetch(SCHEDULE+'?v='+Date.now())).json();
    const items=Array.isArray(j.items)?j.items:[];
    const validItems=items.filter(x=>x.status || x.time || (x.title && x.title!=='일정 없음'));
    if(!validItems.length){box.innerHTML='<div class="empty">이번 주 등록된 방송 일정이 없습니다</div>';return;}
    box.innerHTML=validItems.map(x=>{
      const status=x.status||'일정';
      const time=x.time||'-';
      const title=x.title||status;
      return `<div class="scheduleItem">
        <div class="day"><span>${escapeHtml(x.dayName||'')}</span><span>${escapeHtml(x.date||'')}</span></div>
        <div class="status">${escapeHtml(status)}</div>
        <div class="time">${escapeHtml(time)}</div>
        <div class="title">${escapeHtml(title)}</div>
      </div>`;
    }).join('');
  }catch(e){
    box.innerHTML='<div class="empty">방송일정 로드 실패</div>';
  }
}
async function loadVod(){
  const box=$('vodList');
  if(!box) return;
  try{
    const j=await (await fetch(VOD+'?v='+Date.now())).json();
    const v=j.latest||{};
    const url=v.url||'https://www.sooplive.com/station/wjswlgns09/vod/review';
    const title=v.title||'최근 다시보기';
    const thumb=v.thumb||'';
    const thumbHtml=thumb?`<div class="vodThumb"><img src="${escapeHtml(thumb)}" alt="" referrerpolicy="no-referrer"></div>`:'';
    box.innerHTML=`<a class="vodCard ${thumb?'':'noThumb'}" href="${escapeHtml(url)}" target="_blank">
      ${thumbHtml}
      <div class="vodBody">
        <div class="vodLabel"><span>최근 다시보기</span><span>${escapeHtml(fmtDateTime(v.scrapedAt||j.scrapedAt))}</span></div>
        <p>${escapeHtml(title)}</p>
      </div>
    </a>`;
  }catch(e){
    box.innerHTML='<div class="empty">다시보기 로드 실패</div>';
  }
}

loadAnalysis();loadNotices();loadLive();loadSchedule();loadVod();setInterval(loadLive,60000);
</script>




<script>
(function(){
  const BASE_W = 980; // 원본 디자인 폭
  function naturalHeight(){
    const wrap = document.querySelector('.wrap');
    if(!wrap) return 0;
    const oldTransform = wrap.style.transform;
    wrap.style.transform = 'translateX(-50%) scale(1)';
    const h = wrap.scrollHeight;
    wrap.style.transform = oldTransform;
    return h || 1;
  }

  function fitOnePage(){
    const wrap = document.querySelector('.wrap');
    if(!wrap) return;

    document.documentElement.classList.add('fit-onepage');

    const vw = window.innerWidth;
    const vh = window.innerHeight;

    const baseH = naturalHeight();

    // 가로/세로 중 더 빡센 쪽에 맞춰 전체 축소
    const scaleW = vw / BASE_W;
    const scaleH = vh / baseH;
    const scale = Math.min(scaleW, scaleH, 1);

    wrap.style.width = BASE_W + 'px';
    wrap.style.left = '50%';
    wrap.style.top = '0';
    wrap.style.transformOrigin = 'top center';
    wrap.style.transform = 'translateX(-50%) scale(' + scale + ')';

    // 실제 문서 높이를 화면 높이로 고정해서 하단 여백/스크롤 제거
    document.documentElement.style.height = vh + 'px';
    document.body.style.height = vh + 'px';
    document.body.style.minHeight = '0';
    document.body.style.overflow = 'hidden';

    try {
      parent.postMessage({ type:'jidudu-height', height:vh }, '*');
    } catch(e) {}
  }

  window.addEventListener('load', function(){
    fitOnePage();
    setTimeout(fitOnePage, 300);
    setTimeout(fitOnePage, 1200);
  });
  window.addEventListener('resize', fitOnePage);
  window.addEventListener('orientationchange', function(){
    setTimeout(fitOnePage, 500);
  });
})();
</script>


<script>
(function(){
  let isPlaying = true;
  const btn = document.getElementById('bgmToggle');
  const player = document.getElementById('bgmPlayer');

  // 강제 unmute 시도
  setTimeout(()=>{
    player.src = "https://www.youtube.com/embed/7j9kiIKyhZQ?autoplay=1&loop=1&playlist=7j9kiIKyhZQ";
  }, 500);

  btn.addEventListener('click', function(){
    if(isPlaying){
      player.src = "";
      btn.textContent = "BGM ON";
    }else{
      player.src = "https://www.youtube.com/embed/7j9kiIKyhZQ?autoplay=1&loop=1&playlist=7j9kiIKyhZQ";
      btn.textContent = "BGM OFF";
    }
    isPlaying = !isPlaying;
  });
})();
</script>
